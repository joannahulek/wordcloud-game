name: Sync Prerelease

on:
    push:
        branches: ['main', 'master']
        paths-ignore: [
          README.md
        ]

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: sync-prerelease-${{ github.ref_name }}
    cancel-in-progress: true

jobs:
    sync-prerelease:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Configure Git bot
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Prepare sync branch
              id: sync
              env:
                  SOURCE_BRANCH: ${{ github.ref_name }}
                  TARGET_BRANCH: prerelease
              run: |
                  sync_branch="sync/${SOURCE_BRANCH}-to-${TARGET_BRANCH}"

                  git fetch origin "${SOURCE_BRANCH}" "${TARGET_BRANCH}" --prune

                  if ! git show-ref --verify --quiet "refs/remotes/origin/${TARGET_BRANCH}"; then
                      echo "Target branch '${TARGET_BRANCH}' does not exist. Create it before syncing."
                      exit 1
                  fi

                  if git merge-base --is-ancestor "origin/${SOURCE_BRANCH}" "origin/${TARGET_BRANCH}"; then
                      echo "${TARGET_BRANCH} already contains ${SOURCE_BRANCH}."
                      echo "sync-needed=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  git checkout -B "${sync_branch}" "origin/${TARGET_BRANCH}"
                  git merge --no-ff --no-edit "origin/${SOURCE_BRANCH}"
                  git push --force-with-lease origin "${sync_branch}"

                  echo "sync-needed=true" >> "$GITHUB_OUTPUT"
                  echo "sync-branch=${sync_branch}" >> "$GITHUB_OUTPUT"

            - name: Open or update sync PR to prerelease
              if: steps.sync.outputs.sync-needed == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SOURCE_BRANCH: ${{ github.ref_name }}
                  TARGET_BRANCH: prerelease
                  SYNC_BRANCH: ${{ steps.sync.outputs.sync-branch }}
              run: |
                  existing_pr="$(gh pr list \
                      --base "${TARGET_BRANCH}" \
                      --head "${SYNC_BRANCH}" \
                      --state open \
                      --json number \
                      --jq '.[0].number // empty')"

                  if [ -n "$existing_pr" ]; then
                      gh pr edit "$existing_pr" \
                          --title "chore: sync ${SOURCE_BRANCH} into ${TARGET_BRANCH}" \
                          --body "Keeps ${TARGET_BRANCH} aligned with ${SOURCE_BRANCH} after production release."
                      exit 0
                  fi

                  gh pr create \
                      --base "${TARGET_BRANCH}" \
                      --head "${SYNC_BRANCH}" \
                      --title "chore: sync ${SOURCE_BRANCH} into ${TARGET_BRANCH}" \
                      --body "Keeps ${TARGET_BRANCH} aligned with ${SOURCE_BRANCH} after production release."
