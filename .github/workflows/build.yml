name: Build
on:
    workflow_call:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Setup project
              uses: ./.github/actions/setup

            - name: Build 🛠️
              run: bun run build

            - name: Upload build artifact 🛠️
              uses: actions/upload-artifact@v4
              with:
                  name: build-output-artifact
                  path: dist
