name: Tests

on:
    workflow_call:
    workflow_dispatch:

concurrency:
    group: tests-${{ github.ref }}
    cancel-in-progress: true

jobs:
    unit:
        name: unit
        runs-on: ubuntu-latest

        steps:
            - name: Checkout source
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.head_ref || github.ref }}

            - name: Setup project
              uses: ./.github/actions/setup
              with:
                  skip-checkout: 'true'

            - name: Run unit and integration tests 🛠️
              run: bun run test

    e2e:
      name: e2e
      runs-on: ubuntu-latest

      steps:
          - name: Checkout source
            uses: actions/checkout@v5
            with:
                ref: ${{ github.head_ref || github.ref }}

          - name: Setup project
            uses: ./.github/actions/setup
            with:
                skip-checkout: 'true'

          - name: Install Playwright browsers 🛠️
            run: bunx playwright install --with-deps

          - name: Run end-to-end tests 🛠️
            run: bun run test:e2e
