name: CI
on:
    push:
        branches: ['master', 'main']
        paths-ignore: [
          README.md
        ]
    pull_request:
        # opened - when PR opened, edited - when title changed, synchronize - when new changes are pushed to PR
        types: [opened, edited, synchronize]
        branches: ['release/**', 'master', 'main']
        paths-ignore: [
          README.md
        ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    setup:
        uses: ./.github/workflows/setup.yml

    linters:
        needs: setup
        uses: ./.github/workflows/code-checks.yml

    test:
        runs-on: ubuntu-latest
        needs: setup

        steps:
            - name: Checkout the source branch of the pull request
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref || github.ref }}

            - name: Setup Bun 🛠️
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.2.21

            - name: Get cached dependencies 🛠️
              id: cache-deps
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-

            - name: Install dependencies 🛠️
              run: bun install --frozen-lockfile

            - name: Install Playwright browsers 🛠️
              run: bunx playwright install --with-deps

            - name: Run end-to-end tests 🛠️
              run: bun run test:e2e

    build:
        runs-on: ubuntu-latest
        needs: [setup, linters, test]

        steps:
            - name: Checkout the source branch of the pull request
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref || github.ref }}

            - name: Setup Bun 🛠️
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.2.21

            - name: Get cached dependencies 🛠️
              id: cache-deps
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      bun-${{ runner.os }}-

            - name: Install dependencies 🛠️
              run: bun install --frozen-lockfile

            - name: Build 🛠️
              run: bun run build
